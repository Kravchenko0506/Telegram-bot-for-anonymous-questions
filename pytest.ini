[tool:pytest]
# Main pytest configuration for Anonymous Questions Bot

# Test directories
testpaths = Tests

# ИСПРАВЛЕНО: Зарегистрированы ВСЕ используемые маркеры
markers =
    unit: Unit tests (fast, no external dependencies)
    integration: Integration tests (with database)
    database: Tests requiring database
    handlers: Bot handler tests
    models: Data model tests
    utils: Utility and helper function tests
    security: Security validation tests
    middleware: Middleware tests
    
# Enable asyncio support
asyncio_mode = auto
    
# Minimum Python version
minversion = 3.10

# Command line options - ИСПРАВЛЕНО: убраны конфликтующие опции
addopts = 
    --strict-markers
    --strict-config
    --verbose
    -ra
    --tb=short
    --durations=10
    --disable-warnings
    
# Test discovery patterns
python_files = test_*.py *_test.py middleware.py
python_classes = Test*
python_functions = test_*

# ИСПРАВЛЕНО: Отдельная секция для coverage
[coverage:run]
source = .
omit = 
    */Tests/*
    */venv/*
    */env/*
    */__pycache__/*
    */migrations/*
    setup.py
    conftest.py
    debug*.py
    reset_database.py
    check_config.py
    skript.py
    setup_tests.py
    run_tests.py

[coverage:report]
# Exclude lines from coverage
exclude_lines =
    pragma: no cover
    def __repr__
    if self.debug:
    if settings.DEBUG
    raise AssertionError
    raise NotImplementedError
    if 0:
    if __name__ == .__main__.:
    class .*\bProtocol\):
    @(abc\.)?abstractmethod

# Minimum coverage for each file
fail_under = 70

# Show missing lines
show_missing = true

# Precision of percentage display
precision = 2

[coverage:html]
directory = Tests/coverage_html
title = Anonymous Questions Bot - Coverage Report

# ИСПРАВЛЕНО: Правильные фильтры warnings (убран несуществующий PytestUnknownMarkWarning)
filterwarnings =
    ignore::DeprecationWarning
    ignore::RuntimeWarning
    ignore::UserWarning
    ignore:.*asyncio.*:DeprecationWarning

# Настройки для Windows
console_output_style = progress

# Тайм-ауты для долгих тестов (в секундах)
timeout = 300