[tool:pytest]
# Основная конфигурация pytest для Telegram Bot проекта

# Директории с тестами
testpaths = tests

# Маркеры для группировки тестов
markers =
    unit: Модульные тесты (быстрые, без внешних зависимостей)
    integration: Интеграционные тесты (с базой данных)
    e2e: End-to-end тесты (полный workflow)
    slow: Медленные тесты (длительность > 1 сек)
    database: Тесты, требующие базу данных
    handlers: Тесты хэндлеров бота
    models: Тесты моделей данных
    utils: Тесты утилит и вспомогательных функций
    admin: Тесты админ-функций
    user: Тесты пользовательских функций
    states: Тесты управления состояниями
    validation: Тесты валидации
    security: Тесты безопасности
    
# Минимальная версия Python
minversion = 3.10

# Добавить текущую директорию в PYTHONPATH
addopts = 
    --strict-markers
    --strict-config
    --verbose
    -ra
    --cov=.
    --cov-report=html:tests/coverage_html
    --cov-report=term-missing
    --cov-report=xml
    --cov-fail-under=80
    --durations=10
    --tb=short
    
# Паттерны для обнаружения тестов
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Настройки coverage
[coverage:run]
source = .
omit = 
    */tests/*
    */venv/*
    */env/*
    */__pycache__/*
    */migrations/*
    setup.py
    conftest.py
    */Tests/*
    debug*.py
    reset_database.py
    check_config.py

[coverage:report]
# Исключить строки из покрытия
exclude_lines =
    pragma: no cover
    def __repr__
    if self.debug:
    if settings.DEBUG
    raise AssertionError
    raise NotImplementedError
    if 0:
    if __name__ == .__main__.:
    class .*\bProtocol\):
    @(abc\.)?abstractmethod

# Минимальное покрытие для каждого файла
fail_under = 75

# Показать строки без покрытия
show_missing = true

# Точность отображения процентов
precision = 2

[coverage:html]
directory = tests/coverage_html
title = Anonymous Questions Bot - Coverage Report