[tool:pytest]
# Main pytest configuration for Telegram Bot project

# Test directories
testpaths = Tests

# Markers for test grouping
markers =
    unit: Unit tests (fast, no external dependencies)
    integration: Integration tests (with database)
    database: Tests requiring database
    handlers: Bot handler tests
    models: Data model tests
    utils: Utility and helper function tests
    security: Security validation tests
    
# Enable asyncio support
asyncio_mode = auto
    
# Minimum Python version
minversion = 3.10

# Command line options
addopts = 
    --strict-markers
    --strict-config
    --verbose
    -ra
    --cov=.
    --cov-report=html:Tests/coverage_html
    --cov-report=term-missing
    --cov-report=xml
    --cov-fail-under=70
    --durations=10
    --tb=short
    
# Test discovery patterns
python_files = test_*.py *_test.py middleware.py
python_classes = Test*
python_functions = test_*

# Coverage configuration
[coverage:run]
source = .
omit = 
    */Tests/*
    */venv/*
    */env/*
    */__pycache__/*
    */migrations/*
    setup.py
    conftest.py
    debug*.py
    reset_database.py
    check_config.py
    skript.py
    setup_tests.py

[coverage:report]
# Exclude lines from coverage
exclude_lines =
    pragma: no cover
    def __repr__
    if self.debug:
    if settings.DEBUG
    raise AssertionError
    raise NotImplementedError
    if 0:
    if __name__ == .__main__.:
    class .*\bProtocol\):
    @(abc\.)?abstractmethod

# Minimum coverage for each file
fail_under = 70

# Show missing lines
show_missing = true

# Precision of percentage display
precision = 2

[coverage:html]
directory = Tests/coverage_html
title = Anonymous Questions Bot - Coverage Report